#―――[ Shadows ]―――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――
shadow = false;

shadow-radius = 12;
shadow-opacity = 0.75;
shadow-offset-x = -15;
shadow-offset-y = -15;

shadow-exclude = [
	"window_type = 'dock'",
	# "name = 'Polybar'",
	"class_g = 'i3-frame'"
];

#―――[ Shadows ]―――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――


#―――[ Fades ]―――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――
fading = false;

fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 10;

no-fading-openclose = true;

fade-exclude = [
	"class_g = 'Polybar'",
	"class_g = 'Firefox'",
	"class_g = 'Rofi'"
];

#―――[ Fades ]―――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――


#―――[ Opacity ]―――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――
inactive-opacity = 1;
active-opacity = 1;

frame-opacity = 1.0;
inactive-dim = 0;

inactive-opacity-override = false;
# opacity-rule = ["70:class_g = 'Alacritty'"];
opacity-rule = [
  "100:class_g = 'firefox'",
];

#―――[ Opacity ]―――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――


#―――[ Corners ]―――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――
corner-radius = 10;

#―――[ Corners ]―――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――


#―――[ Blur ]――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――
blur-background = false;

blur-method = "gaussian";
blur-size = 2;
blur-deviation = 5.0;
blur-background-exclude = [
	"window_type = 'dock'",
	"class_g = 'Polybar'",
	"class_i = 'gnome-screenshot'",
];

#―――[ Blur ]――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――――


#―――[ General Settings ]――――――――――――――――――――――――――――――――――――――――――――――――――――――――
backend = "glx";
vsync = true;

#―――[ General Settings ]――――――――――――――――――――――――――――――――――――――――――――――――――――――――


#―――[ Global Animations ]―――――――――――――――――――――――――――――――――――――――――――――――――――――――
animations = (
	#################################
	# Open: expand from center
	#################################
	{
		triggers = [ "open", "show" ];

		scale-x = {
			curve = "cubic-bezier(0.65, 0.0, 0.35, 1.0)";
			duration = 0.20;
			start = 0.8;
			end = 1.0;
		};

		scale-y = "scale-x";

		# keep scaling centered
		offset-x = "(1 - scale-x) * window-width / 2";
		offset-y = "(1 - scale-y) * window-height / 2";

		opacity = {
			curve = "cubic-bezier(0.65, 0.0, 0.35, 1.0)";
			duration = 0.20;
			start = 0;
			end = "window-raw-opacity";
		};

		shadow-opacity = "opacity";
		shadow-scale-x = "scale-x";
		shadow-scale-y = "scale-y";
		shadow-offset-x = "offset-x";
		shadow-offset-y = "offset-y";
	},

	#################################
	# Close: fade out
	#################################
	{
		triggers = [ "close", "hide" ];

		opacity = {
			curve = "cubic-bezier(0.65, 0.0, 0.35, 1.0)";
			duration = 0.20;
			start = "window-raw-opacity";
			end = 0;
		};

		shadow-opacity = "opacity";
	},

	#################################
	# Existing windows: resize/move
	# to fill freed space
	#################################
	{
		triggers = [ "geometry" ];

		preset = "geometry-change";
		duration = 0.20;
	}
);

#―――[ Global Animations ]―――――――――――――――――――――――――――――――――――――――――――――――――――――――


