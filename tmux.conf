set -g default-terminal "tmux-256color"

# Truecolor support for whatever tmux sees as the outer client
set -as terminal-features ",screen-256color-bce:RGB"
set -as terminal-features ",screen*:RGB"
set -as terminal-features ",xterm*:RGB"

# Cursor shape support
set -as terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'

# nvim insert -> normal caret lag fix
set -sg escape-time 10

set -g mouse on

# source within tmux
bind-key r source-file ~/.tmux.conf \; display "Reloaded from ~/.tmux.conf"

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

bind q kill-session

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# set -g @catppuccin_flavour 'mocha'

set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'

# set vi-mode
set-window-option -g mode-keys vi

# keybindings
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

set -s set-clipboard on

# window splitting
bind "-"  split-window -v -c "#{pane_current_path}"
bind "\\" split-window -h -c "#{pane_current_path}"


#---[ Status Bar ]--------------------------------------------------------------

# General Options
set -g status on
set -g status-position bottom
set -g status-interval 5

set -g status-style "fg=#f5e9f2,bg=default"
set -g window-status-separator ""

# Window Names unchanged
set -g automatic-rename off
set -g allow-rename     off

# colors
set -g @c1 "fg=#c678a3,bg=default"
set -g @c2 "fg=#1f1625,bg=#c678a3,bold"
set -g @c3 "fg=#f5e9f2,bg=#4a3652"
set -g @c4 "bg=default"
set -g @c5 "fg=#1f1625,bg=#f2b8d6,bold"
set -g @c6 "bg=default"
set -g @c7 "fg=#1f1625,bg=#d89ac2,bold"

set -g @project ""
set -g @pane_title ""

# Left
# set -g status-left-length 40
# set -g status-left " #[#{@c1}] #[#{@c2}] #S #[#{@c1} "
set -g status-left ""

# Window List
set -g window-status-format         " #[#{@c3}] #I:#W #[#{@c4}] "
set -g window-status-current-format " #[#{@c5}] #I:#W #[#{@c6}] "

# Right
# set -g status-right-length 80
set -g status-right " #[#{@c1}] #[#{@c2}] #S #[#{@c1}] #[#{@c7}] %a %b %d  %H:%M "

#---[ Status Bar ]--------------------------------------------------------------

